# Standalone JSON Schema fragment for a page of products. Returned by the REST "list" and
# "search" endpoints, and by the GraphQL `products` and `searchProducts` queries.
type: object
title: ProductPage
description: A single page of Product results.
required:
  - content
  - page
  - size
  - totalElements
  - totalPages
properties:
  content:
    type: array
    items:
      # NOTE: this points at the exact same fragment as components/schemas/Product in
      # openapi.yaml. Fed directly to OpenAPI Generator, that reuse isn't recognized -
      # its OpenAPI 3.1 dereferencer generates a spurious duplicate class ("Product1")
      # for this usage instead (tried rewriting this ref itself several ways, and
      # tried pinning openapi.yaml to 3.0.3 - both made things equal or worse; see git
      # history / prior conversation for the dead ends). What actually fixes it is
      # upstream of this file: schema-openapi/build.gradle.kts runs BundleOpenApiSpec
      # (in buildSrc) before generation, which merges the multi-file spec into one
      # document and rewrites every reference to this fragment - this one included -
      # to a single literal "#/components/schemas/Product" pointer. That same-file,
      # same-string reuse is what the generator actually handles correctly, so the
      # generated ProductPage.content is List<Product>, no Product1 involved.
      $ref: "./Product.yaml"
  page:
    type: integer
    format: int32
    minimum: 0
    description: Zero-based page index requested.
  size:
    type: integer
    format: int32
    minimum: 1
    description: Page size requested.
  totalElements:
    type: integer
    format: int64
    minimum: 0
    description: Total number of matching elements across all pages.
  totalPages:
    type: integer
    format: int32
    minimum: 0
    description: Total number of pages available.
