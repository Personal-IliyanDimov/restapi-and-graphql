# Standalone JSON Schema fragment for a page of products. Returned by the REST "list" and
# "search" endpoints, and by the GraphQL `products` and `searchProducts` queries.
type: object
title: ProductPage
description: A single page of Product results.
required:
  - content
  - page
  - size
  - totalElements
  - totalPages
properties:
  content:
    type: array
    items:
      # NOTE: despite this pointing at the exact same fragment as
      # components/schemas/Product in openapi.yaml, OpenAPI Generator's OpenAPI 3.1
      # dereferencer does not recognize the two as the same model and generates a
      # second, structurally-identical class ("Product1") for this usage. Tried
      # routing this through "#/components/schemas/Product" (fails: a bare "#/..."
      # only resolves within this file), through an explicit cross-file pointer
      # (resolves fine, but still duplicates the class), and through pinning
      # openapi.yaml to 3.0.3 instead of 3.1 (worse: 3.0's resolver doesn't chase this
      # ref at all and silently types the field as Object) - this is a known-cosmetic
      # limitation of the tool's beta OpenAPI 3.1 support, not a design flaw here.
      # ProductCatalogService.toPageItem() bridges the two; it's a plain field copy,
      # not a second implementation of anything.
      $ref: "./Product.yaml"
  page:
    type: integer
    format: int32
    minimum: 0
    description: Zero-based page index requested.
  size:
    type: integer
    format: int32
    minimum: 1
    description: Page size requested.
  totalElements:
    type: integer
    format: int64
    minimum: 0
    description: Total number of matching elements across all pages.
  totalPages:
    type: integer
    format: int32
    minimum: 0
    description: Total number of pages available.
