# Standalone JSON Schema fragment (JSON Schema Draft 2020-12 / OpenAPI 3.1 compatible).
# This is the single source of truth for the "Product" shape. It is:
#   - $ref'd from openapi.yaml (REST contract) to generate the Java POJO via OpenAPI Generator.
#   - mirrored field-for-field by the `Product` type in the schema-graphql module's
#     graphql/schema.graphqls, whose codegen is configured (see schema-graphql/build.gradle.kts)
#     to bind to this exact generated Java class instead of generating a second one.
type: object
title: Product
description: A product in the catalog.
required:
  - id
  - name
  - price
  - quantity
properties:
  id:
    type: string
    format: uuid
    description: Server-generated unique identifier.
    readOnly: true
  name:
    type: string
    minLength: 1
    maxLength: 200
    description: Display name of the product.
  description:
    type: string
    maxLength: 2000
    nullable: true
    description: Optional longer description.
  price:
    type: number
    format: double
    minimum: 0
    exclusiveMinimum: false
    description: Unit price, in the catalog's default currency.
  quantity:
    type: integer
    format: int32
    minimum: 0
    description: Units currently in stock.
  category:
    type: string
    maxLength: 100
    nullable: true
    description: Optional free-text category label.
  createdAt:
    type: string
    format: date-time
    readOnly: true
    description: Creation timestamp, set by the server.
  updatedAt:
    type: string
    format: date-time
    readOnly: true
    description: Last-modified timestamp, set by the server.
